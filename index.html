<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO ! তোৰ বেতা কাম নাই না দে আহাৰ কাৰণে ভাল লাগিল </title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#2563eb);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            max-width:700px;
            width:100%;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:20px;
            padding:35px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        img{
            width:180px;
            border-radius:15px;
            margin-bottom:20px;
        }

        h1{
            font-size:36px;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            line-height:1.7;
            color:#f1f5f9;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 28px;
            background:white;
            color:#2563eb;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#e2e8f0;
        }
    </style>
</head>
<body>

<div class="card">

    <img src="https://via.placeholder.com/180" alt="Photo">

    <h1>Welcome!</h1>

    <p>
        This website was created using GitHub Pages.
        <br><br>
        Replace this text with your own message.
    </p>

    <a href="#" class="btn">yoyo</a>

</div>

</body>
</html>
